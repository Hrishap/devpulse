server:
  port: 8080

spring:
  application:
    name: devpulse-backend
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:devpulse}?timezone=UTC
    username: ${PGUSER:devpulse}
    password: ${PGPASSWORD:devpulse}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    locations: classpath:db/migration

devpulse:
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  queue:
    topic: devpulse-events
  cache:
    ttl: PT5M
  scheduler:
    enabled: ${SCHEDULER_ENABLED:true}
  resend-api-key: ${RESEND_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
